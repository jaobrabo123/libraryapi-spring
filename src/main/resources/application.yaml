spring:
  application:
    name: libraryapi
  datasource:
    url: jdbc:postgresql://localhost:5433/library
    username: postgres
    password: senha
    driver-class-name: org.postgresql.Driver # Declarar o driver é opcional pois já detecta do pom.xml
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: none # none, create, create-drop